name: Release Engine

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build evaluation package
        working-directory: tools/evaluation/rag-audit-engine
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Build auditing package
        working-directory: tools/auditing/supply-chain-scanner
        run: |
          python -m pip install --upgrade pip build
          python -m build
              
      - name: Build defense package
        working-directory: tools/defense/prompt-guard
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: tools/evaluation/rag-audit-engine/dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tools/evaluation/rag-audit-engine/dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
